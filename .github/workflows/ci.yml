name: Evaluate and Save Metrics

on:
  push:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y libgl1
      - name: Run evaluation and generate plots
        run: python evaluate.py

      - name: Upload metric plots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-metrics
          path: results/
